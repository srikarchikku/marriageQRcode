<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Srikar Weds Gayatri</title>

<style>

/* Page */

body{
margin:0;
font-family:'Segoe UI',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
text-align:center;
background:url("couple.png") center/cover no-repeat;
}

/* Container */

.container{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
padding-top:120px;
}

/* Title */

.title{
font-size:48px;
color:#7a2c2c;
font-weight:bold;
margin-bottom:35px;
text-shadow:1px 1px 4px rgba(0,0,0,0.25);
}

/* Button container */

.links{
display:flex;
flex-direction:column;
gap:20px;
}

/* Buttons */

.btn{
padding:16px 35px;
font-size:18px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#c89b3c,#f5e6a6);
color:#4b2e2e;
font-weight:bold;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
transition:0.25s;
}

.btn:hover{
transform:scale(1.05);
}

/* Mobile */

@media(max-width:768px){

.container{
padding-top:90px;
}

.title{
font-size:34px;
}

.btn{
font-size:16px;
padding:14px 28px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="title">
💍 Srikar Weds Gayatri 💍
</div>

<div class="links">

<button class="btn"
onclick="window.open('https://maps.app.goo.gl/5qVGxQGQGMuK3caN9')">
📍 Marriage Location </button>

<button class="btn"
onclick="window.open('https://maps.app.goo.gl/ZPdXHjhM1WDK9GSx6')">
📍 Reception Location </button>

</div>

</div>

</body>
</html>
