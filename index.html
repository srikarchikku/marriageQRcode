<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Srikar Weds Gayatri</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@500;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
background:url("couple.png") center/cover no-repeat;
position:relative;
text-align:center;
}

/* Container */

.container{
position:absolute;
top:23%;
left:50%;
transform:translate(-50%,-50%);
width:100%;
}

/* Title */

.title{
font-family:'Great Vibes',cursive;
font-size:82px;
color:#a56b1f;
margin-bottom:40px;
text-shadow:0 0 12px rgba(255,215,0,0.5);
}

/* Heart */

.heart{
color:#c92525;
font-size:52px;
}

/* Section title */

.section{
font-family:'Playfair Display',serif;
font-size:33px;
color:#8b4d17;
margin-top:20px;
}

/* Date */

.date{
font-family:'Playfair Display',serif;
font-size:26px;
margin-top:6px;
}

/* Venue */

.venue{
font-family:'Cormorant Garamond',serif;
font-size:26px;
font-weight:600;
margin-top:8px;
}

/* Location button */

.map{
display:inline-block;
margin-top:12px;
padding:8px 18px;
font-size:18px;
font-family:'Playfair Display',serif;
color:#7a3e12;
border:2px solid #caa252;
border-radius:20px;
background:linear-gradient(#f9e7c2,#f1d29c);
text-decoration:none;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
transition:0.2s;
}

.map:hover{
transform:scale(1.05);
}

/* spacing between events */

.event{
margin-top:30px;
}

/* Mobile */

@media(max-width:768px){

.title{
font-size:54px;
}

.section{
font-size:22px;
}

.venue{
font-size:22px;
}

.map{
font-size:16px;
padding:7px 16px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="title">
Srikar <span class="heart">❤</span> Gayatri
</div>

<div class="event">

<div class="section">Marriage Details: </div>

<div class="date">
April 04, 2026
</div>

<div class="venue">
Arya Vyshya A/C Function Hall, Warangal
</div>

<a class="map"
href="https://maps.app.goo.gl/NURKLaESyEGVy8FD9"
target="_blank">
Venue Location 📍 </a>

</div>

<div class="event">

<div class="section">Reception Details: </div>

<div class="date">
April 05, 2026
</div>

<div class="venue">
Reddy A/C Convention Function Hall, Jagtial
</div>

<a class="map"
href="https://maps.app.goo.gl/Zse7jfjvKJ6uTBqU7"
target="_blank">
Venue Location 📍 </a>

</div>

</div>

</body>
</html>
