<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Srikar Weds Gayatri</title>

<!-- Google Fonts -->

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

/* Page */

body{
margin:0;
font-family:'Poppins',sans-serif;
height:100vh;
background:url("couple.png") center/cover no-repeat;
position:relative;
}

/* Container positioned between garland and faces */

.container{
position:absolute;
top:28%;
left:50%;
transform:translate(-50%, -50%);
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
width:100%;
}

/* Title */

.title{
font-family:'Great Vibes',cursive;
font-size:78px;
color:#9c5a18;
margin-bottom:50px;
}

/* Heart */

.heart{
color:#c92525;
font-size:50px;
vertical-align:middle;
}

/* Buttons container */

.links{
display:flex;
flex-direction:column;
gap:36px;
align-items:center;
}

/* Elegant buttons */

.btn{
width:320px;
padding:20px;
font-size:24px;
border-radius:40px;
border:2px solid #caa252;
background:linear-gradient(#f9e7c2,#f1d29c);
color:#5a3a15;
font-weight:600;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
transition:0.25s;
}

.btn:hover{
transform:scale(1.05);
}

/* Mobile adjustments */

@media(max-width:768px){

.container{
top:40%;
}

.title{
font-size:46px;
}

.btn{
font-size:18px;
width:240px;
padding:16px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="title">
Srikar <span class="heart">❤</span> Gayatri
</div>

<div class="links">

<button class="btn"
onclick="window.open('https://maps.app.goo.gl/5qVGxQGQGMuK3caN9')">
Marriage Location 📍 </button>

<button class="btn"
onclick="window.open('https://maps.app.goo.gl/ZPdXHjhM1WDK9GSx6')">
Reception Location 📍 </button>

</div>

</div>

</body>
</html>
