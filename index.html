<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Srikar Weds Gayatri</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
height:100vh;
background:url("couple.png") center/cover no-repeat;
position:relative;
}

/* Container */

.container{
position:absolute;
top:18%;
left:50%;
transform:translate(-50%, -50%);
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
width:100%;
}

/* Title with glow */

.title{
font-family:'Great Vibes',cursive;
font-size:85px;
color:#d4a437;
margin-bottom:40px;
animation:glow 3s ease-in-out infinite alternate;
}

/* Glow animation */

@keyframes glow{

from{
text-shadow:
0 0 5px #d4a437,
0 0 10px #d4a437,
0 0 15px #e7c873;
}

to{
text-shadow:
0 0 10px #ffd700,
0 0 20px #ffd700,
0 0 30px #fff1b0;
}

}

/* Heart */

.heart{
color:#c92525;
font-size:55px;
}

/* Cards */

.card{
background:rgba(255,255,255,0.85);
padding:20px 30px;
border-radius:18px;
margin:10px;
width:340px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.card-title{
font-size:22px;
font-weight:600;
margin-bottom:10px;
color:#8b4d17;
}

.details{
font-size:18px;
margin:6px 0;
}

/* Map link */

.map-link{
display:inline-block;
margin-top:8px;
font-weight:600;
color:#8b4d17;
text-decoration:none;
}

.map-link:hover{
text-decoration:underline;
}

/* Mobile */

@media(max-width:768px){

.title{
font-size:50px;
}

.card{
width:280px;
padding:18px;
}

.details{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="title">
Srikar <span class="heart">❤</span> Gayatri
</div>

<div class="card">

<div class="card-title">Marriage Details</div>

<div class="details">
Date: April 04, 2026
</div>

<div class="details">
Location: Arya Vyshya Function Hall, Warangal
</div>

<a class="map-link"
href="https://maps.app.goo.gl/5qVGxQGQGMuK3caN9"
target="_blank">
View Location 📍 </a>

</div>

<div class="card">

<div class="card-title">Reception Details</div>

<div class="details">
Date: April 05, 2026
</div>

<div class="details">
Location: Reddy Function Hall, Jagtial
</div>

<a class="map-link"
href="https://maps.app.goo.gl/ZPdXHjhM1WDK9GSx6"
target="_blank">
View Location 📍 </a>

</div>

</div>

</body>
</html>
