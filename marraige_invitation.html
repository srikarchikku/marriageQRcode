<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Srikar Weds Gayatri</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:url("couple.png") center/cover no-repeat;
}

/* overlay to make text readable */

.overlay{
background:rgba(255,255,255,0.65);
backdrop-filter:blur(2px);
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* title */

.title{
font-size:48px;
color:#7a2c2c;
font-weight:bold;
margin-bottom:40px;
text-shadow:1px 1px 3px rgba(0,0,0,0.2);
}

/* button container */

.links{
display:flex;
flex-direction:column;
gap:25px;
}

/* buttons */

.btn{
padding:18px 40px;
font-size:20px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#c89b3c,#f5e6a6);
color:#4b2e2e;
font-weight:bold;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
transition:0.25s;
}

.btn:hover{
transform:scale(1.05);
}

@media(max-width:768px){

.title{
font-size:36px;
}

.btn{
font-size:18px;
padding:15px 30px;
}

}

</style>

</head>

<body>

<div class="overlay">

<div class="title">
💍 Srikar Weds Gayatri 💍
</div>

<div class="links">

<button class="btn"
onclick="window.open('https://maps.app.goo.gl/5qVGxQGQGMuK3caN9')">
📍 Marriage Location </button>

<button class="btn"
onclick="window.open('https://maps.app.goo.gl/ZPdXHjhM1WDK9GSx6')">
📍 Reception Location </button>

</div>

</div>

</body>
</html>
