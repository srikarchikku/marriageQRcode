<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Srikar Weds Gayatri</title>

<style>

body{
margin:0;
padding:0;
font-family: 'Segoe UI', sans-serif;
background:#f4efe6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{

width:100%;
max-width:900px;
text-align:center;
position:relative;

}

/* Background image */

.wedding-bg{

width:100%;
border-radius:20px;
filter:brightness(90%) saturate(90%);
}

/* Buttons */

.buttons{

position:absolute;
top:42%;
left:50%;
transform:translate(-50%, -50%);
display:flex;
flex-direction:column;
gap:20px;

}

.btn{

padding:16px 35px;
font-size:20px;
border-radius:40px;
border:none;
cursor:pointer;
font-weight:bold;
background:linear-gradient(45deg,#d4af37,#f3e5ab);
box-shadow:0 8px 18px rgba(0,0,0,0.2);
transition:0.3s;

}

.btn:hover{

transform:scale(1.05);

}

/* Cartoon couple at bottom */

.couple{

position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
width:350px;

}

/* Mobile */

@media(max-width:768px){

.buttons{

top:45%;

}

.btn{

font-size:18px;

}

.couple{

width:260px;

}

}

</style>
</head>


<body>

<div class="container">

<img src="background.png" class="wedding-bg">

<div class="buttons">

<button class="btn"
onclick="window.open('https://maps.app.goo.gl/5qVGxQGQGMuK3caN9')">
📍 Marriage Location
</button>

<button class="btn"
onclick="window.open('https://maps.app.goo.gl/ZPdXHjhM1WDK9GSx6')">
📍 Reception Location
</button>

</div>

<img src="couple.png" class="couple">

</div>

</body>
</html>
